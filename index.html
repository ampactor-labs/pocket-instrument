<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>pocket — session</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #0e0e0f;
        --bar: #1b1b1d;
        --panel: #202022;
        --cell: #262628;
        --cell-line: #060606;
        --text: #d2d2d4;
        --dim: #76767a;
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* Transport bar */
      #transport {
        flex: 0 0 auto;
        display: flex;
        align-items: stretch;
        height: 54px;
        padding-top: env(safe-area-inset-top, 0px);
        background: var(--bar);
        border-bottom: 1px solid #000;
        position: relative;
        z-index: 30; /* stays above the editor scrim/sheet — always usable */
      }
      .tbtn.disabled {
        opacity: 0.32;
        pointer-events: none;
      }
      .tleft {
        gap: 7px;
      }
      .tleft {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        padding: 0 10px;
        border-right: 1px solid #000;
      }
      .ttempo {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 12px;
      }
      .tbtn {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        min-width: 34px;
        padding: 0 10px;
        border-radius: 5px;
        background: #2b2b2e;
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        border: 1px solid #000;
      }
      .seg {
        flex: 0 0 auto;
      }
      #bpm {
        flex: 0 0 auto;
        min-width: 78px;
        padding: 8px 10px;
        border: 1px solid #000;
        border-radius: 6px;
        background: #2b2b2e;
        text-align: center;
        touch-action: none;
      }
      #bpm.dragging {
        background: #3a3a40;
        color: #fff;
      }
      .swingctl {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
      }
      .swlabel {
        font-size: 10px;
        color: var(--dim);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .swval {
        font-size: 11px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        width: 32px;
        color: var(--text);
      }
      .swingslider {
        width: 74px;
        accent-color: #e8b84b;
      }
      .keyctl {
        display: flex;
        align-items: center;
        gap: 5px;
        flex: 0 0 auto;
      }
      .keysel {
        background: #2b2b2e;
        color: var(--text);
        border: 1px solid #000;
        border-radius: 5px;
        padding: 5px 4px;
        font-size: 12px;
        font-weight: 600;
      }
      .tbtn.play.on {
        background: #d24b4b;
        color: #fff;
      }
      .tbtn.accent {
        color: #e8b84b;
      }
      #bpm {
        font-variant-numeric: tabular-nums;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      #bpm small {
        color: var(--dim);
        font-size: 10px;
        font-weight: 600;
        margin-left: 3px;
      }
      .spacer {
        flex: 1;
      }

      #footer {
        flex: 0 0 auto;
        display: grid;
        gap: 6px;
        padding: 6px 8px calc(7px + env(safe-area-inset-bottom, 0px));
        background: var(--bar);
        border-top: 1px solid #000;
        position: relative;
        z-index: 6;
      }
      .frow {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .frow .tbtn {
        height: 32px;
        min-width: 42px;
        padding: 0 9px;
      }
      .fspacer {
        flex: 1;
      }

      /* Session grid */
      #session {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .grid {
        display: grid;
        grid-template-columns: 58px repeat(4, 1fr);
        gap: 2px;
        padding: 2px;
        background: #000;
      }
      .head {
        background: var(--panel);
        padding: 6px 5px 5px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.4px;
        color: var(--text);
        border-bottom: 2px solid var(--tc, #444);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .head.track-head {
        display: flex;
        flex-direction: column;
        gap: 5px;
        align-items: center;
        justify-content: center;
      }
      .head.track-head.pressing,
      .arr-thead.pressing {
        filter: brightness(1.16);
      }
      .head-name {
        width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .head.corner {
        background: var(--bar);
        border-bottom: 2px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .view-mix {
        min-width: 44px;
        height: 28px;
        border: 1px solid #000;
        border-radius: 5px;
        background: #2b2b2e;
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .head-ms,
      .arr-thead .ms,
      .mx-ms {
        display: flex;
        gap: 4px;
      }
      .msbtn {
        width: 22px;
        height: 20px;
        border-radius: 4px;
        background: #2a2a2c;
        border: 1px solid #000;
        color: var(--dim);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 900;
        touch-action: manipulation;
      }
      .msbtn.on {
        background: color-mix(in srgb, var(--tc) 62%, #19191b);
        color: #fff;
        border-color: color-mix(in srgb, var(--tc) 82%, #000);
      }
      .track-head.muted,
      .mx-strip.muted {
        opacity: 0.62;
      }
      .track-head.soloed {
        outline: 1px solid color-mix(in srgb, var(--tc) 80%, #fff);
        outline-offset: -1px;
      }
      .clip.track-muted,
      .arr-lane.track-muted .arr-clip {
        opacity: 0.38;
      }
      .scenecell {
        background: var(--panel);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        min-height: 62px;
        font-size: 12px;
        font-weight: 700;
      }
      .scenecell .tri {
        color: var(--dim);
        font-size: 12px;
      }
      .scenecell.playing .tri {
        color: #7bd67b;
      }
      .clip {
        position: relative;
        min-height: 62px;
        border-radius: 3px;
        background: var(--cell);
        border: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 8px;
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.25;
        color: #f2f2f2;
        overflow: hidden;
      }
      .clip.filled {
        background: color-mix(in srgb, var(--tc) 34%, #161616);
        border: 1px solid color-mix(in srgb, var(--tc) 50%, #000);
      }
      .clip.filled .tri {
        position: absolute;
        top: 5px;
        left: 6px;
        font-size: 9px;
        color: color-mix(in srgb, var(--tc) 80%, #fff 20%);
      }
      .clip.playing {
        background: color-mix(in srgb, var(--tc) 62%, #161616);
        border-color: color-mix(in srgb, var(--tc) 85%, #fff);
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--tc) 85%, #fff) inset;
      }
      .clip.pressing {
        filter: brightness(1.18);
      }
      .clip-badge {
        position: absolute;
        right: 5px;
        bottom: 4px;
        max-width: calc(100% - 10px);
        padding: 2px 5px;
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.38);
        color: color-mix(in srgb, var(--tc) 78%, #fff);
        font-size: 9px;
        font-weight: 800;
        line-height: 1;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .clip.empty {
        color: var(--dim);
        border: 1px dashed #333;
        background: #161617;
        font-size: 18px;
        font-weight: 400;
      }
      .clip .mini {
        display: flex;
        gap: 2px;
        align-items: flex-end;
        height: 16px;
      }
      .clip .mini i {
        width: 3px;
        background: color-mix(in srgb, var(--tc) 85%, #fff 15%);
        border-radius: 1px;
        opacity: 0.85;
      }

      /* Editor bottom sheet */
      #scrim {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
        z-index: 9;
      }
      #scrim.open {
        opacity: 1;
        pointer-events: auto;
      }
      #sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 10;
        background: var(--panel);
        border-top: 1px solid #000;
        border-radius: 12px 12px 0 0;
        transform: translateY(110%);
        transition: transform 0.26s cubic-bezier(0.2, 0.7, 0.2, 1);
        padding: 10px 12px calc(16px + env(safe-area-inset-bottom, 0px));
        max-height: 78%;
        overflow-y: auto;
        pointer-events: none;
      }
      #sheet.open {
        transform: translateY(0);
        pointer-events: auto;
      }
      .sheet-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .sheet-bar .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--tc, #888);
      }
      .sheet-bar .title {
        font-size: 14px;
        font-weight: 700;
      }
      .sheet-bar .sub {
        color: var(--dim);
        font-size: 12px;
        font-weight: 600;
      }
      .sheet-bar .close {
        margin-left: auto;
        background: #2b2b2e;
        border: 1px solid #000;
        border-radius: 5px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .propsection {
        border-top: 1px solid #000;
        padding: 10px 0;
      }
      .proplabel {
        margin-bottom: 7px;
        color: var(--dim);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .choicegrid {
        display: grid;
        gap: 7px;
      }
      .choicegrid.two {
        grid-template-columns: repeat(2, 1fr);
      }
      .choicegrid.four {
        grid-template-columns: repeat(4, 1fr);
      }
      .choice,
      .numval {
        min-height: 42px;
        border: 1px solid #000;
        border-radius: 6px;
        background: #2b2b2e;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }
      .choice.on {
        background: color-mix(in srgb, var(--tc) 58%, #1d1d20);
        color: #fff;
        border-color: color-mix(in srgb, var(--tc) 74%, #000);
      }
      .numrow {
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        gap: 8px;
        align-items: center;
      }
      .choice.stepper {
        font-size: 18px;
      }
      .tempo-sheet {
        display: grid;
        gap: 10px;
      }
      .tempo-input {
        width: 100%;
        height: 54px;
        border-radius: 8px;
        border: 1px solid #000;
        background: #151517;
        color: var(--text);
        text-align: center;
        font-size: 24px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      /* Drum step grid */
      .drumrow {
        display: grid;
        grid-template-columns: 54px 1fr;
        gap: 6px;
        align-items: center;
        margin-bottom: 6px;
      }
      .pad {
        height: 34px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #101012;
        background: var(--pc);
      }
      .steps {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 3px;
      }
      .step {
        height: 34px;
        border-radius: 4px;
        background: #1a1a1c;
        border: 1px solid #0a0a0a;
      }
      .step.g {
        background: #202024;
      }
      .step.on {
        background: var(--pc);
      }
      .step.cursor {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -1px;
      }

      /* Harmony editor */
      .chordrow {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 14px;
      }
      .cslot {
        height: 56px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 700;
        background: color-mix(in srgb, var(--tc) 40%, #161616);
        border: 1px solid #000;
      }
      .cslot.sel {
        outline: 2px solid #e8b84b;
      }
      .picker {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      .copt {
        height: 46px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: #0d0d0f;
      }

      /* Session / Arrangement toggle */
      .seg {
        display: flex;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #000;
        background: #111;
      }
      .seg .opt {
        padding: 8px 11px;
        font-size: 12px;
        font-weight: 700;
        color: var(--dim);
      }
      .seg .opt.on {
        background: #35353a;
        color: var(--text);
      }

      /* Arrangement view */
      #arrangement {
        flex: 1;
        display: none;
        min-height: 0;
      }
      #app.arrange #arrangement {
        display: block;
      }
      #app.arrange #session {
        display: none;
      }
      .arr-wrap {
        display: grid;
        grid-template-columns: 78px 1fr;
        height: 100%;
      }
      .arr-headers {
        background: var(--bar);
        border-right: 1px solid #000;
      }
      .arr-corner {
        height: 28px;
        border-bottom: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .arr-corner .view-mix {
        height: 22px;
        min-width: 48px;
        font-size: 11px;
      }
      .arr-thead {
        height: 64px;
        border-bottom: 1px solid #000;
        padding: 7px 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
      }
      .arr-thead .dot {
        width: 22px;
        height: 3px;
        border-radius: 2px;
        background: var(--tc);
      }
      .arr-thead .nm {
        font-size: 11px;
        font-weight: 700;
      }
      .arr-thead .ms {
        display: flex;
        gap: 4px;
      }
      .arr-scroll {
        overflow-x: auto;
        overflow-y: hidden;
        position: relative;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x;
      }
      .arr-content {
        position: relative;
      }
      .arr-ruler {
        height: 28px;
        position: relative;
        border-bottom: 1px solid #000;
        background: #131315;
      }
      .arr-tick {
        position: absolute;
        top: 0;
        bottom: 0;
        border-left: 1px solid #2b2b2d;
        padding-left: 4px;
        font-size: 9px;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
        display: flex;
        align-items: center;
      }
      .arr-lane {
        height: 64px;
        position: relative;
        border-bottom: 1px solid #000;
        background-image: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px);
        background-size: var(--ppb, 74px) 100%;
      }
      .arr-clip {
        position: absolute;
        top: 5px;
        bottom: 5px;
        touch-action: none;
        border-radius: 3px;
        background: color-mix(in srgb, var(--tc) 34%, #161616);
        border: 1px solid color-mix(in srgb, var(--tc) 55%, #000);
        overflow: hidden;
        padding: 4px 6px;
        font-size: 10px;
        font-weight: 700;
        color: #f2f2f2;
      }
      .arr-clip.sel {
        outline: 2px solid #fff;
        z-index: 3;
      }
      .arr-clip .cmini {
        display: flex;
        gap: 1px;
        align-items: flex-end;
        height: 14px;
        margin-top: 4px;
      }
      .arr-clip .cmini i {
        width: 2px;
        background: color-mix(in srgb, var(--tc) 85%, #fff 15%);
        border-radius: 1px;
      }
      .arr-clip .rz {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 16px;
        background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--tc) 60%, #000));
      }
      .arr-playhead {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #eaeaec;
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
        pointer-events: none;
        z-index: 4;
        will-change: transform;
      }
      .arr-loop {
        position: absolute;
        top: 2px;
        height: 9px;
        border-radius: 3px;
        background: rgba(232, 184, 75, 0.12);
        border: 1px solid rgba(232, 184, 75, 0.4);
        touch-action: none;
        z-index: 5;
      }
      .arr-loop.on {
        background: rgba(232, 184, 75, 0.34);
        border-color: rgba(232, 184, 75, 0.9);
      }
      .arr-loop .lz {
        position: absolute;
        right: -3px;
        top: -3px;
        bottom: -3px;
        width: 14px;
      }
      .arr-tools {
        position: absolute;
        top: 3px;
        z-index: 6;
        display: flex;
        gap: 6px;
      }
      .arr-tools div {
        background: #2b2b2e;
        border: 1px solid #000;
        border-radius: 5px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 600;
      }

      /* Piano roll */
      .prow {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 5px;
        align-items: center;
        margin-bottom: 3px;
      }
      .pkey {
        font-size: 9px;
        font-weight: 700;
        color: var(--dim);
        text-align: right;
        padding-right: 4px;
      }
      .pkey.c {
        color: var(--text);
      }
      .psteps {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 3px;
      }
      .pcell {
        height: 22px;
        border-radius: 3px;
        background: #1a1a1c;
        border: 1px solid #0a0a0a;
        touch-action: none;
      }
      .pcell.g {
        background: #202024;
      }
      .pcell.on {
        background: var(--tc);
      }
      .pcell.cursor {
        outline: 2px solid rgba(255, 255, 255, 0.5);
        outline-offset: -1px;
      }
      .pcell.nstart {
        box-shadow: inset 3px 0 0 rgba(255, 255, 255, 0.55);
      }
      .vlane {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 5px;
        align-items: end;
        margin-top: 10px;
      }
      .vkey {
        font-size: 9px;
        font-weight: 700;
        color: var(--dim);
        text-align: right;
        padding-right: 4px;
      }
      .vsteps {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 3px;
        height: 46px;
      }
      .vbar {
        background: #1a1a1c;
        border: 1px solid #0a0a0a;
        border-radius: 3px;
        display: flex;
        align-items: flex-end;
        overflow: hidden;
        touch-action: none;
      }
      .vbar i {
        display: block;
        width: 100%;
        background: var(--tc);
      }

      /* Mixer — vertical Ableton-style channel strips */
      .mx-container {
        display: flex;
        gap: 2px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
      }
      .mx-strip {
        flex: 1 0 0;
        min-width: 74px;
        background: #1a1a1c;
        border: 1px solid #000;
        border-radius: 8px;
        padding: 10px 6px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .mx-name {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        width: 100%;
        padding-bottom: 6px;
        border-bottom: 1px solid #2a2a2c;
      }
      .mx-ms {
        width: 100%;
        justify-content: center;
      }
      .mx-strip.focus {
        outline: 2px solid color-mix(in srgb, var(--tc) 75%, #fff);
        outline-offset: -2px;
      }
      .mx-master {
        background: #202022;
      }
      .mx-master-note,
      .mx-master-chain {
        width: 100%;
        color: var(--dim);
        font-size: 9px;
        font-weight: 800;
        line-height: 1.25;
        text-transform: uppercase;
        text-align: center;
      }
      .mx-dot {
        width: 8px;
        height: 8px;
        border-radius: 3px;
        background: var(--tc);
        flex-shrink: 0;
      }
      .mx-meter {
        width: 18px;
        height: 100px;
        background: #111;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .mx-meter-track {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
      }
      .mx-meter-track i {
        display: block;
        width: 100%;
        height: 100%;
        transform: scaleY(0);
        transform-origin: bottom;
        will-change: transform;
        background: linear-gradient(0deg, #4caf50, #e8b84b 70%, #d24b4b);
        border-radius: 3px;
      }
      .mx-vfader {
        writing-mode: vertical-lr;
        direction: rtl;
        height: 90px;
        width: 28px;
        accent-color: var(--tc);
      }
      .mx-val {
        font-size: 9px;
        font-weight: 700;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
      }
      .mx-knob {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .mx-knob label {
        font-size: 9px;
        font-weight: 700;
        color: var(--dim);
        text-transform: uppercase;
      }
      .mx-knob input[type="range"] {
        width: 100%;
        accent-color: var(--tc);
      }
      .mx-dev-section {
        width: 100%;
        border-top: 1px solid #2a2a2c;
        padding-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .mx-devlabel {
        font-size: 9px;
        font-weight: 700;
        color: var(--dim);
        text-transform: uppercase;
      }
      .mx-preset {
        width: 100%;
        background: #2b2b2e;
        color: var(--text);
        border: 1px solid #000;
        border-radius: 5px;
        padding: 5px 4px;
        font-size: 11px;
        font-weight: 600;
      }

      /* Export sheet */
      .exp-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }
      .exp-btn {
        background: #2b2b2e;
        border: 1px solid #000;
        border-radius: 8px;
        padding: 18px 10px;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
      }
      .exp-btn:active {
        background: #3a3a40;
      }
      .exp-status {
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        color: var(--dim);
        min-height: 20px;
      }
      .project-file {
        display: none;
      }

      /* Transform buttons (Arp / Humanize / ...) */
      .tfrow {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .tfbtn {
        background: #2b2b2e;
        border: 1px solid #000;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
      }
      .tfbtn:active {
        background: #3a3a40;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="transport"></div>
      <div id="session"></div>
      <div id="arrangement"></div>
      <div id="footer"></div>
    </div>
    <div id="scrim"></div>
    <div id="sheet"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
